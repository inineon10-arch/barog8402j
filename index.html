<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BAROG · 학습 자료실</title>
<meta name="description" content="바로그 영어 학원 학생들을 위한 학습 자료 모음입니다." />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Noto+Serif+KR:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #f5f1ea;
    --bg-alt: #ebe5d9;
    --ink: #1f2a30;
    --ink-soft: #4a5560;
    --ink-mute: #7a8590;
    --accent: #6b4423;
    --accent-soft: #a07855;
    --line: #d6cfc0;
    --card: #fbf8f2;
    --shadow: 0 1px 2px rgba(31, 42, 48, 0.04), 0 8px 24px rgba(31, 42, 48, 0.06);
    --shadow-hover: 0 2px 4px rgba(31, 42, 48, 0.06), 0 16px 40px rgba(31, 42, 48, 0.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    font-family: 'Noto Serif KR', 'Cormorant Garamond', Georgia, serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.7;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    background-image:
      radial-gradient(ellipse at top left, rgba(160, 120, 85, 0.06), transparent 50%),
      radial-gradient(ellipse at bottom right, rgba(107, 68, 35, 0.04), transparent 50%);
  }

  /* ==================== HEADER ==================== */
  .site-header {
    border-bottom: 1px solid var(--line);
    background: rgba(245, 241, 234, 0.85);
    backdrop-filter: blur(12px);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-inner {
    max-width: 1180px;
    margin: 0 auto;
    padding: 1.25rem 2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.6rem;
    font-weight: 600;
    letter-spacing: 0.02em;
    color: var(--ink);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }

  .nav {
    display: flex;
    gap: 2rem;
    font-family: 'Inter', sans-serif;
    font-size: 0.9rem;
    font-weight: 400;
  }
  .nav a {
    color: var(--ink-soft);
    text-decoration: none;
    transition: color 0.2s ease;
    letter-spacing: 0.02em;
    cursor: pointer;
    padding-bottom: 2px;
    border-bottom: 1px solid transparent;
    transition: color 0.2s ease, border-color 0.2s ease;
  }
  .nav a:hover { color: var(--accent); }
  .nav a.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  /* ==================== HERO ==================== */
  .hero {
    max-width: 1180px;
    margin: 0 auto;
    padding: 6rem 2rem 5rem;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 3rem;
    align-items: end;
    border-bottom: 1px solid var(--line);
  }

  .hero h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.8rem, 6vw, 4.5rem);
    font-weight: 500;
    line-height: 1.05;
    letter-spacing: -0.01em;
    color: var(--ink);
    margin-bottom: 1.5rem;
  }
  .hero h1 em {
    font-style: italic;
    color: var(--accent);
    font-weight: 400;
  }

  .hero-subtitle {
    font-size: 1.05rem;
    color: var(--ink-soft);
    max-width: 540px;
    line-height: 1.8;
  }

  .hero-meta {
    font-family: 'Inter', sans-serif;
    font-size: 0.8rem;
    color: var(--ink-mute);
    text-align: right;
    line-height: 1.6;
    border-left: 1px solid var(--line);
    padding-left: 2rem;
  }
  .hero-meta strong {
    display: block;
    font-weight: 500;
    color: var(--ink);
    font-size: 0.9rem;
    margin-bottom: 0.25rem;
  }

  /* ==================== TAB SWITCHER ==================== */
  .tab-bar {
    max-width: 1180px;
    margin: 0 auto;
    padding: 2.5rem 2rem 0;
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--line);
  }

  .tab-btn {
    font-family: 'Noto Serif KR', serif;
    font-size: 1rem;
    font-weight: 500;
    color: var(--ink-mute);
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    padding: 0.75rem 1.75rem;
    margin-bottom: -1px;
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: color 0.2s ease, border-color 0.2s ease;
    position: relative;
  }
  .tab-btn:hover { color: var(--ink-soft); }
  .tab-btn.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  /* ==================== MATERIALS SECTION ==================== */
  .materials-section {
    max-width: 1180px;
    margin: 0 auto;
    padding: 4rem 2rem 6rem;
    display: none;
  }
  .materials-section.visible { display: block; }

  .section-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 3rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--line);
  }

  .section-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.2rem;
    font-weight: 500;
    letter-spacing: -0.005em;
  }
  .section-title em {
    font-style: italic;
    color: var(--accent);
  }

  .section-count {
    font-family: 'Inter', sans-serif;
    font-size: 0.85rem;
    color: var(--ink-mute);
    letter-spacing: 0.05em;
  }

  /* Search */
  .search-wrap {
    margin-bottom: 2.5rem;
    position: relative;
    max-width: 480px;
  }
  .search-input {
    width: 100%;
    padding: 0.9rem 1.1rem 0.9rem 2.8rem;
    font-family: 'Noto Serif KR', serif;
    font-size: 0.95rem;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 2px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
  }
  .search-input:focus {
    border-color: var(--accent-soft);
    box-shadow: 0 0 0 3px rgba(160, 120, 85, 0.1);
  }
  .search-input::placeholder { color: var(--ink-mute); font-style: italic; }
  .search-icon {
    position: absolute;
    left: 1rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--ink-mute);
    pointer-events: none;
  }

  /* Grid — smaller cards (minmax 200px → ~절반 크기) */
  .materials-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 1rem;
  }

  .material-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 2px;
    padding: 1.1rem 1rem;
    text-decoration: none;
    color: var(--ink);
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
    position: relative;
    overflow: hidden;
    box-shadow: var(--shadow);
  }

  .material-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 2px;
    background: var(--accent);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.4s ease;
  }

  .material-card:hover {
    transform: translateY(-3px);
    box-shadow: var(--shadow-hover);
    border-color: var(--accent-soft);
  }
  .material-card:hover::before { transform: scaleX(1); }

  .card-number {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 0.75rem;
    color: var(--accent);
    letter-spacing: 0.05em;
  }

  .card-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 0.95rem;
    font-weight: 600;
    line-height: 1.4;
    color: var(--ink);
  }

  .card-description {
    font-size: 0.78rem;
    color: var(--ink-soft);
    line-height: 1.6;
    flex-grow: 1;
  }

  .card-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 0.25rem;
    padding-top: 0.6rem;
    border-top: 1px dashed var(--line);
  }

  .card-tag {
    font-family: 'Inter', sans-serif;
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--ink-mute);
  }

  .card-arrow {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    color: var(--accent);
    transition: transform 0.3s ease;
  }
  .material-card:hover .card-arrow { transform: translateX(4px); }

  .no-results {
    grid-column: 1 / -1;
    text-align: center;
    padding: 4rem 2rem;
    color: var(--ink-mute);
    font-style: italic;
  }

  /* ==================== FOOTER ==================== */
  .site-footer {
    border-top: 1px solid var(--line);
    background: var(--bg-alt);
    padding: 3rem 2rem;
    margin-top: 4rem;
  }

  .footer-inner {
    max-width: 1180px;
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 1.5rem;
  }

  .footer-text {
    font-family: 'Inter', sans-serif;
    font-size: 0.85rem;
    color: var(--ink-mute);
  }
  .footer-text em {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    color: var(--accent);
  }

  /* ==================== ANIMATIONS ==================== */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .hero > *, .section-header, .search-wrap {
    animation: fadeUp 0.8s ease both;
  }
  .material-card {
    animation: fadeUp 0.5s ease both;
  }

  /* ==================== RESPONSIVE ==================== */
  @media (max-width: 768px) {
    .header-inner { padding: 1rem 1.25rem; }
    .nav { gap: 1.25rem; font-size: 0.85rem; }
    .hero {
      grid-template-columns: 1fr;
      padding: 4rem 1.25rem 3rem;
      gap: 2rem;
    }
    .hero-meta {
      border-left: none;
      border-top: 1px solid var(--line);
      padding-left: 0;
      padding-top: 1.5rem;
      text-align: left;
    }
    .tab-bar { padding: 1.5rem 1.25rem 0; }
    .materials-section { padding: 3rem 1.25rem 4rem; }
    .section-header {
      flex-direction: column;
      align-items: flex-start;
      gap: 0.5rem;
    }
    .materials-grid { grid-template-columns: repeat(2, 1fr); gap: 0.75rem; }
    .material-card { padding: 1rem 0.875rem; }
    .footer-inner { flex-direction: column; text-align: center; }
  }
</style>
</head>

<body>

<header class="site-header">
  <div class="header-inner">
    <a href="#" class="logo">BAROG English</a>
    <nav class="nav">
      <a onclick="switchTab('wrong')" id="nav-wrong" class="active">오답단어</a>
    </nav>
  </div>
</header>

<section class="hero">
  <div>
    <h1>Practice<br><em>makes</em>Perfect</h1>
    <p class="hero-subtitle">오늘의 오답은 내일의 실력이 됩니다.</p>
  </div>
</section>

<!-- 탭 버튼 -->
<div class="tab-bar">
  <button class="tab-btn active" id="tab-wrong" onclick="switchTab('wrong')">오답단어</button>
</div>

<!-- 오답단어 섹션 -->
<main class="materials-section visible" id="section-wrong">
  <div class="section-header">
    <h2 class="section-title">오답단어 <em></em></h2>
    <div class="section-count" id="count-wrong">전체 자료</div>
  </div>
  <div class="search-wrap">
    <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"></circle>
      <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
    </svg>
    <input type="text" class="search-input" id="search-wrong" placeholder="날짜로 검색하세요." aria-label="오답단어 검색">
  </div>
  <div class="materials-grid" id="grid-wrong"></div>
</main>

<footer class="site-footer">
  <div class="footer-inner">
    <div class="footer-text">
      Barog English · <em>Crafted with care for our students</em>
    </div>
  </div>
</footer>

<script>
  /* =============================================================
     오답단어 자료 목록
     ============================================================= */
  const wrongMaterials = [
      { filename: "lesson-04.html", title: "5월 15일", description: "금요일", tag: "." },
      { filename: "lesson-03.html", title: "5월 13일", description: "수요일", tag: "." },
    
 {
      filename: "lesson-02.html",
      title: "5월 8일",
      description: "금요일",
      tag: "."
    },

      {
      filename: "lesson-01.html",
      title: "5월 6일",
      description: "수요일",
      tag: "."
    }
  ];


  function pad(n) { return String(n).padStart(2, '0'); }

  function renderMaterials(list, gridId, countId) {
    const grid = document.getElementById(gridId);
    const countDisplay = document.getElementById(countId);
    grid.innerHTML = '';

    if (list.length === 0) {
      grid.innerHTML = '<div class="no-results">자료가 없습니다.</div>';
      countDisplay.textContent = '자료 없음';
      return;
    }

    countDisplay.textContent = `전체 ${list.length}개 자료`;

    list.forEach((item, idx) => {
      const card = document.createElement('a');
      card.className = 'material-card';
      card.href = `materials/${item.filename}`;
      card.style.animationDelay = `${0.04 * idx}s`;
      card.innerHTML = `
        <div class="card-number">No. ${pad(idx + 1)}</div>
        <div class="card-title">${item.title}</div>
        <div class="card-description">${item.description}</div>
        <div class="card-footer">
          <span class="card-tag">${item.tag}</span>
          <span class="card-arrow">→</span>
        </div>
      `;
      grid.appendChild(card);
    });
  }

  function filterMaterials(list, keyword) {
    const k = keyword.trim().toLowerCase();
    if (!k) return list;
    return list.filter(m =>
      m.title.toLowerCase().includes(k) ||
      m.description.toLowerCase().includes(k) ||
      m.tag.toLowerCase().includes(k)
    );
  }

  // 검색 이벤트
  document.getElementById('search-wrong').addEventListener('input', (e) => {
    renderMaterials(filterMaterials(wrongMaterials, e.target.value), 'grid-wrong', 'count-wrong');
  });

  // 초기 렌더
  renderMaterials(wrongMaterials, 'grid-wrong', 'count-wrong');
</script>

</body>
</html>
